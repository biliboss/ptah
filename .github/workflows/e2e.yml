name: E2E (Playwright)

on:
  push:
    branches: [main]
    paths:
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'src/content/docs/**'
      - 'src/styles/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - '.github/workflows/e2e.yml'
  pull_request:
    paths:
      - 'astro.config.mjs'
      - 'src/content/docs/**'
      - 'e2e/**'
      - 'playwright.config.ts'

jobs:
  e2e:
    name: Playwright vs preview build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build Astro site
        run: npm run build
        env:
          SITE: http://localhost:4321
          BASE: /ptah
      - name: Run Playwright against preview
        run: |
          npx astro preview --port 4321 &
          npx wait-on http://localhost:4321/ptah/ -t 30000
          E2E_BASE_URL=http://localhost:4321/ptah/ npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
