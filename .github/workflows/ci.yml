name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-macos:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-13]
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: zig fmt --check
        run: zig fmt --check src build.zig

      - name: zig build (host, no piper)
        run: zig build -Doptimize=ReleaseFast

      - name: zig build test
        run: zig build test --summary all

      - name: smoke daemon + enqueue
        run: |
          ./zig-out/bin/ptah --version
          ./zig-out/bin/ptah daemon > /tmp/daemon.log 2>&1 &
          sleep 3
          ./zig-out/bin/ptah --engine say "CI smoke test"
          sleep 1
          ./zig-out/bin/ptah queue
          pkill -f "ptah daemon" || true
          cat /tmp/daemon.log

  # v1.3 — Linux build proves the cross-platform refactor compiles and
  # links on a real Linux host. The macOS host cannot link the Linux
  # binary (missing libsqlite3 + libasound system libs); CI is the
  # source of truth for the Linux green build.
  build-test-linux:
    name: build + test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install Linux system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsqlite3-dev \
            libasound2-dev \
            espeak-ng

      - name: zig fmt --check
        run: zig fmt --check src build.zig

      - name: zig build (host, no piper)
        run: zig build -Doptimize=ReleaseFast

      - name: zig build test
        run: zig build test --summary all

      - name: smoke daemon + enqueue (espeak-ng)
        run: |
          ./zig-out/bin/ptah --version
          ./zig-out/bin/ptah daemon > /tmp/daemon.log 2>&1 &
          sleep 3
          ./zig-out/bin/ptah --engine say "CI smoke test"
          sleep 1
          ./zig-out/bin/ptah queue
          pkill -f "ptah daemon" || true
          cat /tmp/daemon.log

  # v1.3 — Windows is best-effort. Marked continue-on-error: tts.zig
  # spawns powershell System.Speech but the path has never been runtime-
  # tested. CI guarantees the source compiles; nothing more.
  build-windows:
    name: build (windows-latest, best-effort)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: zig build (host, no piper)
        run: zig build -Doptimize=ReleaseFast

  universal:
    name: universal binary build
    runs-on: macos-14
    needs: build-test-macos
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: zig build universal
        run: zig build universal
      - name: lipo verify
        run: |
          file zig-out/bin/ptah-universal
          lipo -info zig-out/bin/ptah-universal
      - uses: actions/upload-artifact@v4
        with:
          name: ptah-universal
          path: zig-out/bin/ptah-universal
